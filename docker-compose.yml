version: '3.9'

services:
  postgres:
    image: postgres:16.0
    container_name: atomic_habit_postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7
    container_name: atomic_habit_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 10s
      retries: 3

  web:
    image: ${DOCKER_HUB_USERNAME}/atomic-habit:${GITHUB_SHA}
    container_name: atomic_habit_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    image: ${DOCKER_HUB_USERNAME}/atomic-habit:${GITHUB_SHA}
    container_name: atomic_habit_celery_worker
    command: celery -A config worker -l info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  celery_beat:
    image: ${DOCKER_HUB_USERNAME}/atomic-habit:${GITHUB_SHA}
    container_name: atomic_habit_celery_beat
    command: celery -A config beat -l info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

volumes:
  postgres_data: