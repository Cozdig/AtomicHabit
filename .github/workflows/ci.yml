name: Atomic Habit CI/CD Pipeline

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: python manage.py test
      env:
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        GITHUB_ACTIONS: true

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }} | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin

      - name: Build and push
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/atomic-habit:latest .
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/atomic-habit:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/atomic-habit:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/atomic-habit:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/atomic-habit
            if [ ! -d .git ]; then
              git clone https://github.com/${{ github.repository }} .
            else
              git pull
            fi
            git checkout ${{ github.ref_name }}
            cat > .env << 'ENVEOF'
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DEBUG=False
            ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_HOST=postgres
            DB_PORT=5432
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_HOST=postgres
            EMAIL=${{ secrets.EMAIL }}
            WEB_PASSWORD=${{ secrets.WEB_PASSWORD }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            REDIS_URL=redis://redis:6379/0
            ENVEOF
            export DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}
            export GITHUB_SHA=${{ github.sha }}
            docker compose down || true
            docker compose pull
            docker compose up -d